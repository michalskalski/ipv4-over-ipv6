[runtime]
# pidfile, provided AFTR, HB46PP cache, and status snapshot
state_dir = "/var/run/dslite-b4"

[tunnel]
# When omitted, local_v6 is discovered from the route to the AFTR.
# local_v6 = "2001:db8::1"
local_v4 = "192.0.0.2"

[aftr]
# Optional static override. If omitted, the daemon reads runtime AFTR state.
address = "2001:db8::2"

[discovery]
# Automatic AFTR discovery is opt-in.
method = "none"
# vendor_id = "000000"
# product = "dslite-b4"

[health]
# Periodic reconciliation interval. Network-change and runtime-state hints wake sooner.
# interval_secs = 30

# Keep using the current AFTR IPv6 for this long after it disappears from DNS.
# aftr_missing_grace_secs = 600
